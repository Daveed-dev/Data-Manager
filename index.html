<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Data</title>
    <!-- CSS -->
    <link rel="stylesheet" href="main.css" />
    <!-- font-cons -->
     <link rel="stylesheet" href="fontawesome-free-7.2.0-web/css/all.min.css">
  </head>
  <body>
    <div id="page">
      <header id="header">
        <h1>Student Data Manager</h1>
      </header>

      <div id="formContainer">
        <form action="" id="form">
          <input type="text" id="name" placeholder="Name" />
          <input type="email" id="email" placeholder="Email" />
          <input type="text" id="course" placeholder="Course" />
          <button type="submit" id="btn">Add Student</button>
        </form>
      </div>
    </div>
    <footer id="footer">
      <div id="footer-link">
        <a href="https://github.com/Daveed-dev/Data-Manager.git">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="https://x.com/David_JoyDD">
          <i class="fa-brands fa-twitter"></i>
        </a>
      </div>
      <p>
        &copy; <span id="date"></span>2025</span> Student Data Manager. All rights
        reserved.
      </p>
    </footer>

    <!-- js -->
    <script src="main.js"></script>
  </body>
</html>
